services:
  - type: web
    name: zen-assets-backend
    runtime: node
    region: oregon
    plan: free
    branch: master
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: REFRESH_EXPIRES_IN
        value: 30d
      - key: ADMIN_EMAIL
        value: admin@zenassets.com
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_NAME
        value: ZEN Admin
      - key: FRONTEND_URL
        value: https://zenassets.tech
      - key: DB_PATH
        value: /data/zen_assets.db
      - key: EARNINGS_CRON_ENABLED
        value: "true"
      - key: RESEND_API_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: LOGIN_RATE_LIMIT
        value: 10
      - key: LOGIN_RATE_WINDOW
        value: 15
      - key: DATA_ENCRYPTION_KEY
        sync: false
    disk:
      name: zen-assets-db
      mountPath: /data
      sizeGB: 1
